# Polygon News Scout — Runtime Configuration
# Secrets come from ~/.claude/.env — never hardcode here

claude:
  model: claude-sonnet-4-6
  call1_max_tokens: 600
  call2_max_tokens: 5000

scoring:
  mw_relevance_min: 6          # minimum polygon_relevance to post
  legolas_pick_min_relevance: 7 # minimum for polygon_pick tier
  article_cache_hours: 4
  recently_posted_hours: 24
  lookback_minutes: 35
  tag_sa_min: 5000              # minimum S/A for a tag to validate proven_topic
  tag_fr_max: 25                # maximum failure rate % for proven_topic tags

sheets:
  sheet_id: "1UoA00JxWojYw_5xaxv0eqAiFOB4b586LAWYTjtoOd5g"
  tag_tab_names: [Tags, Tag, tag, tags]
  seen_tab: Seen
  feedback_log_tab: FeedbackLog

slack:
  channel_id: "C0B9K83B6TX"
  post_enabled: true

perennials:
  sheet_id: "1xn1Ksy_ObO4o95rfuUZSIVHku2b5Ix5PsME9eU7J4MM"
  perennials_tab: "Perennials Performance Tracking"
  new_release_tab: "New Release Performance Tracking"
  data_start_row: 7
  boost_perennial: 1
  boost_new_release: 1
  boost_new_release_hot: 2
  hot_window_days: 3
  release_window_before: 14
  release_window_after: 42
  gnews_lookback: "2h"
  skip_search_types:
    - Genre
    - Service
    - Other

corporate_half_weight:
  # Outlets owned by the same corporate parent count as 0.5 each toward the
  # trending source threshold — so one company publishing the same story across
  # its mastheads can't manufacture a "Breaking Story" on its own.
  PMC:            # Penske Media — entertainment trades
    - Deadline
    - Variety
    - Hollywood Reporter
