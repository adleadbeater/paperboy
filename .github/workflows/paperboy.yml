name: Polygon News Scout

on:
  schedule:
    # Every 30 min, 7am–8pm EST (noon–1am UTC)
    - cron: '*/30 12-23 * * *'
    - cron: '0,30 0 * * *'
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google service account key
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > paperboy-key.json

      - name: Run Polygon Scout
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          POLYGON_SLACK_WEBHOOK: ${{ secrets.POLYGON_SLACK_WEBHOOK }}
          POLYGON_SLACK_BOT_TOKEN: ${{ secrets.POLYGON_SLACK_BOT_TOKEN }}
          GOOGLE_APPLICATION_CREDENTIALS: paperboy-key.json
        run: python paperboy.py

      - name: Commit updated learnings and seen GUIDs
        run: |
          git config user.name "Polygon Scout Bot"
          git config user.email "polygon-bot@users.noreply.github.com"
          git add data/learnings.json data/seen_guids.json
          git diff --staged --quiet || git commit -m "chore: update learnings [skip ci]"
          git push
